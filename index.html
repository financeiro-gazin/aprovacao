<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Aprovação de Pagamentos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f2efe9;--card:#faf8f4;--dark:#1c1c1a;--muted:#8a8880;--border:#e4e0d8;--g:#5a9e1a;--r:#c03030;--wa:#25D366;--accent:#5a9e1a}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}

/* TELA INICIAL */
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.screen.active{display:flex}
.logo{font-size:32px;font-weight:800;letter-spacing:-.03em;margin-bottom:6px}
.logo span{color:var(--g)}
.subtitle{font-size:14px;color:var(--muted);margin-bottom:40px}
.drop-zone{width:100%;max-width:420px;border:2px dashed var(--border);border-radius:16px;padding:48px 24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--card)}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--g);background:#f0fbe6}
.drop-icon{font-size:48px;margin-bottom:12px}
.drop-title{font-size:16px;font-weight:700;margin-bottom:6px}
.drop-sub{font-size:13px;color:var(--muted)}
#fileInput{display:none}
.config-box{width:100%;max-width:420px;margin-top:20px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:16px}
.config-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}
.config-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--dark);outline:none}
.config-input:focus{border-color:var(--g)}
.error-msg{color:var(--r);font-size:13px;margin-top:12px;display:none}

/* TELA DE RESULTADO */
#resultScreen{padding:0}
.res-header{background:var(--dark);color:#f2efe9;padding:16px}
.res-header h2{font-size:18px;font-weight:700}
.res-header p{font-size:12px;color:var(--muted);margin-top:2px}
.res-actions{display:flex;gap:8px;padding:12px 16px;background:var(--bg);border-bottom:1.5px solid var(--border)}
.res-actions button{flex:1;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-download{background:var(--dark);color:#f2efe9}
.btn-new{background:transparent;color:var(--muted);border:1.5px solid var(--border)!important}
.preview-wrap{padding:12px 16px;overflow-y:auto;flex:1}
.preview-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
.preview-table{width:100%;border-collapse:collapse;font-size:12px}
.preview-table th{background:var(--dark);color:#f2efe9;padding:8px 10px;text-align:left;font-weight:600}
.preview-table td{padding:7px 10px;border-bottom:1px solid var(--border)}
.preview-table tr:nth-child(even) td{background:#f5f2ec}
.total-row{background:var(--dark)!important;color:#f2efe9;font-weight:700}
.total-row td{background:var(--dark)!important;color:#f2efe9!important;padding:10px!important;font-weight:700!important}
.success-badge{display:inline-flex;align-items:center;gap:6px;background:#eaf5d8;color:var(--g);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;margin-top:8px}
</style>
</head>
<body>

<!-- TELA INICIAL -->
<div class="screen active" id="uploadScreen">
  <div class="logo">Aprovação<span>.</span></div>
  <p class="subtitle">Gerador de relatório diário de pagamentos</p>

  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">📊</div>
    <div class="drop-title">Arraste o arquivo .XLS aqui</div>
    <div class="drop-sub">ou clique para selecionar</div>
    <input type="file" id="fileInput" accept=".xls,.xlsx">
  </div>

  <div class="config-box">
    <div class="config-label">Número WhatsApp (com DDI+DDD)</div>
    <input class="config-input" type="text" id="waNumber" placeholder="5519981262033" value="5519981262033">
  </div>

  <p class="error-msg" id="errorMsg">⚠️ Não foi possível ler o arquivo. Verifique o formato.</p>
</div>

<!-- TELA DE RESULTADO -->
<div class="screen" id="resultScreen" style="align-items:stretch;justify-content:flex-start">
  <div class="res-header">
    <h2 id="resTitle">Relatório gerado</h2>
    <p id="resInfo"></p>
    <div class="success-badge">✅ Pronto para baixar</div>
  </div>
  <div class="res-actions">
    <button class="btn-download" id="btnDownload">⬇ Baixar HTML</button>
    <button class="btn-new" id="btnNew">↩ Novo arquivo</button>
  </div>
  <div class="preview-wrap">
    <div class="preview-title">Prévia dos itens</div>
    <table class="preview-table">
      <thead><tr><th>#</th><th>Fornecedor</th><th>Parcela</th><th>Valor</th></tr></thead>
      <tbody id="previewBody"></tbody>
    </table>
  </div>
</div>

<script>
var waNum = document.getElementById('waNumber');
var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
var errorMsg = document.getElementById('errorMsg');

// Drag & drop
dropZone.addEventListener('click', function(){ fileInput.click(); });
dropZone.addEventListener('dragover', function(e){ e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', function(){ dropZone.classList.remove('dragover'); });
dropZone.addEventListener('drop', function(e){
  e.preventDefault();
  dropZone.classList.remove('dragover');
  var file = e.dataTransfer.files[0];
  if(file) processFile(file);
});
fileInput.addEventListener('change', function(){
  if(this.files[0]) processFile(this.files[0]);
});

document.getElementById('btnNew').addEventListener('click', function(){
  document.getElementById('uploadScreen').classList.add('active');
  document.getElementById('resultScreen').classList.remove('active');
  fileInput.value = '';
  errorMsg.style.display = 'none';
});

function processFile(file) {
  errorMsg.style.display = 'none';
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var wb = XLSX.read(data, {type:'array'});
      var ws = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      parseAndGenerate(rows, file.name);
    } catch(err) {
      errorMsg.style.display = 'block';
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseAndGenerate(rows, filename) {
  // Detectar colunas
  var header = null;
  var dataRows = [];
  var colFornecedor = -1, colObs = -1, colParcela = -1, colValor = -1, colData = -1;

  // Procurar linha de cabeçalho
  for(var i = 0; i < Math.min(rows.length, 5); i++) {
    var row = rows[i];
    for(var j = 0; j < row.length; j++) {
      var cell = String(row[j]).toLowerCase().trim();
      if(cell.includes('fornecedor')) colFornecedor = j;
      if(cell.includes('observa')) colObs = j;
      if(cell.includes('parcela')) colParcela = j;
      if(cell.includes('valor')) colValor = j;
      if(cell.includes('vencto') || cell.includes('vencimento') || cell.includes('data')) colData = j;
    }
    if(colFornecedor >= 0 && colValor >= 0) { header = i; break; }
  }

  if(header === null) { document.getElementById('errorMsg').style.display='block'; return; }

  var totalGeral = 0;
  var dateFromFile = null;

  for(var i = header+1; i < rows.length; i++) {
    var row = rows[i];
    var fornecedor = colFornecedor >= 0 ? String(row[colFornecedor]||'').trim() : '';
    var obs = colObs >= 0 ? String(row[colObs]||'').trim() : '';
    var parcela = colParcela >= 0 ? String(row[colParcela]||'').trim() : '1/1';
    var valor = colValor >= 0 ? row[colValor] : 0;
    var dataCell = colData >= 0 ? row[colData] : '';

    if(!fornecedor || fornecedor === '' || fornecedor.toLowerCase() === 'nan') continue;

    // Pegar data do arquivo
    if(!dateFromFile && dataCell) {
      var d = parseDate(dataCell);
      if(d) dateFromFile = d;
    }

    // Checar linha de total
    if(fornecedor.toLowerCase().includes('total') || obs.toLowerCase().includes('total geral')) {
      if(typeof valor === 'number' && valor > 0) totalGeral = valor;
      continue;
    }

    var valorNum = typeof valor === 'number' ? valor : parseFloat(String(valor).replace(/[^\d,\.]/g,'').replace(',','.')) || 0;
    if(valorNum <= 0) continue;

    if(!dateFromFile && dataCell) {
      var d = parseDate(dataCell);
      if(d) dateFromFile = d;
    }

    dataRows.push({
      fornecedor: fornecedor,
      obs: obs === 'nan' ? '' : obs,
      parcela: parcela === 'nan' || parcela === '' ? '1/1' : parcela,
      valor: valorNum
    });
  }

  if(dataRows.length === 0) { document.getElementById('errorMsg').style.display='block'; return; }

  // Calcular total se não veio do arquivo
  if(totalGeral === 0) dataRows.forEach(function(r){ totalGeral += r.valor; });

  // Detectar data pelo nome do arquivo se não encontrou nas células
  if(!dateFromFile) dateFromFile = dateFromFilename(filename);

  var dateLabel = dateFromFile ? formatDateLabel(dateFromFile) : 'Pagamentos do dia';
  var html = buildHTML(dataRows, totalGeral, dateLabel, waNum.value.trim() || '5519981262033');

  // Mostrar prévia
  var tbody = document.getElementById('previewBody');
  tbody.innerHTML = '';
  dataRows.forEach(function(r, i){
    var tr = document.createElement('tr');
    tr.innerHTML = '<td>'+(i+1)+'</td><td>'+r.fornecedor+'</td><td>'+r.parcela+'</td><td>'+formatBRL(r.valor)+'</td>';
    tbody.appendChild(tr);
  });
  var trTotal = document.createElement('tr');
  trTotal.className = 'total-row';
  trTotal.innerHTML = '<td colspan="3">TOTAL GERAL</td><td>'+formatBRL(totalGeral)+'</td>';
  tbody.appendChild(trTotal);

  document.getElementById('resTitle').textContent = dateLabel;
  document.getElementById('resInfo').textContent = dataRows.length + ' pagamentos · ' + formatBRL(totalGeral);

  // Download
  var outName = 'aprovacao_' + (dateFromFile ? (String(dateFromFile.getDate()).padStart(2,'0')+'_'+String(dateFromFile.getMonth()+1).padStart(2,'0')) : 'hoje') + '.html';
  document.getElementById('btnDownload').onclick = function(){
    var blob = new Blob([html], {type:'text/html;charset=utf-8'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = outName;
    a.click();
  };

  document.getElementById('uploadScreen').classList.remove('active');
  document.getElementById('resultScreen').classList.add('active');
}

function parseDate(val) {
  if(!val) return null;
  if(typeof val === 'number') {
    // Excel serial date
    var d = new Date(Math.round((val - 25569)*86400*1000));
    if(!isNaN(d)) return d;
  }
  var s = String(val);
  var m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
  if(m) return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
  m = s.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if(m) return new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]));
  return null;
}

function dateFromFilename(name) {
  var m = name.match(/(\d{2})[_\-](\d{2})/);
  if(m) {
    var day = parseInt(m[1]), month = parseInt(m[2]);
    var year = new Date().getFullYear();
    return new Date(year, month-1, day);
  }
  return null;
}

var MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
function formatDateLabel(d) {
  return String(d.getDate()).padStart(2,'0') + ' de ' + MESES[d.getMonth()] + ' de ' + d.getFullYear();
}

function formatBRL(v) {
  return 'R$\u00a0' + v.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function buildHTML(items, total, dateLabel, phone) {
  var cards = items.map(function(r, i){
    return '<div class="card" id="c'+i+'">'
      +'<div class="card-top"><span class="nome">'+escHTML(r.fornecedor)+' <span class="parc-inline">'+escHTML(r.parcela)+'</span></span>'
      +'<span class="valor">'+formatBRL(r.valor)+'</span></div>'
      +'<div class="card-mid"><span class="obs">'+escHTML(r.obs)+'</span></div>'
      +'<div class="btns">'
      +'<button class="b-ok" data-id="'+i+'" data-val="ok">✔ Aprovar</button>'
      +'<button class="b-nao" data-id="'+i+'" data-val="nao">✘ Reprovar</button>'
      +'</div></div>';
  }).join('\n');

  var dados = JSON.stringify(items.map(function(r){
    return [r.fornecedor, formatBRL(r.valor), r.parcela];
  }));

  return '<!DOCTYPE html>\n<html lang="pt-BR">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">\n<title>Aprovação — '+dateLabel+'</title>\n<style>\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}\n:root{--bg:#f2efe9;--card:#faf8f4;--dark:#1c1c1a;--muted:#8a8880;--border:#e4e0d8;--gl:#eaf5d8;--g:#5a9e1a;--gb:#8ac840;--rl:#fdeaea;--r:#c03030;--rb:#e06060;--wa:#25D366}\nbody{font-family:-apple-system,BlinkMacSystemFont,\'SF Pro Text\',\'Helvetica Neue\',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;padding-bottom:110px;-webkit-text-size-adjust:100%}\n.header{background:var(--dark);color:#f2efe9;padding:20px 16px 16px}\n.hl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}\n.ht{font-size:22px;font-weight:700;letter-spacing:-.02em}\n.topbar{display:flex;gap:8px;padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}\n.topbar button{flex:1;padding:11px 12px;border-radius:10px;border:none;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,.08);touch-action:manipulation}\n.ba{background:var(--dark);color:#f2efe9}\n.bc{background:transparent;color:var(--muted);border:1px solid var(--border)!important}\n.list{padding:12px 16px 0;display:flex;flex-direction:column;gap:8px}\n.card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px 14px 10px;transition:background .18s,border-color .18s}\n.card.ok{background:var(--gl);border-color:var(--gb)}\n.card.nao{background:var(--rl);border-color:var(--rb);opacity:.82}\n.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:4px}\n.nome{font-size:13px;font-weight:700;line-height:1.35;flex:1}\n.parc-inline{font-size:10px;font-weight:700;background:var(--dark);color:#f2efe9;border-radius:20px;padding:2px 8px;white-space:nowrap;margin-left:6px;vertical-align:middle}\n.valor{font-size:13px;font-weight:700;white-space:nowrap;font-variant-numeric:tabular-nums}\n.card-mid{margin-bottom:10px}\n.obs{font-size:11.5px;color:var(--muted);line-height:1.4}\n.btns{display:flex;gap:8px}\n.btns button{flex:1;padding:10px 8px;border-radius:9px;border:none;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none}\n.b-ok{background:var(--gl);color:var(--g)}\n.b-nao{background:var(--rl);color:var(--r)}\n.card.ok .b-ok{background:var(--g);color:#fff}\n.card.nao .b-nao{background:var(--r);color:#fff}\n.divider{height:1px;background:var(--border);margin:14px 16px 0}\n.totais{margin:8px 16px 0;background:var(--dark);border-radius:12px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}\n.tl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}\n.tv{font-size:17px;font-weight:700;color:#f2efe9;font-variant-numeric:tabular-nums}\n.footer{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:12px 16px calc(12px + env(safe-area-inset-bottom))}\n.btn-wa{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--wa);color:#fff;text-decoration:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}\n.btn-wa:active{opacity:.88}\n.stxt{text-align:center;font-size:11.5px;color:var(--muted);margin-top:6px}\n</style>\n</head>\n<body>\n<div class="header"><p class="hl">Pagamentos do dia</p><h1 class="ht">'+dateLabel+'</h1></div>\n<div class="topbar"><button class="ba" id="btnAll">✔ Aprovar todos</button><button class="bc" id="btnClr">Limpar</button></div>\n<div class="list">\n'+cards+'\n</div>\n<div class="divider"></div>\n<div class="totais"><span class="tl">Total geral</span><span class="tv">'+formatBRL(total)+'</span></div>\n<div class="footer"><a id="lwa" class="btn-wa" href="#"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>Enviar pelo WhatsApp</a><p class="stxt" id="stxt">Nenhum item avaliado ainda</p></div>\n<script>\nvar NUM="'+phone+'";\nvar DADOS='+dados+';\nvar E={};\ndocument.getElementById("btnAll").addEventListener("click",aprovarTodos);\ndocument.getElementById("btnClr").addEventListener("click",limparTodos);\ndocument.getElementById("lwa").addEventListener("click",abrirWA);\ndocument.querySelectorAll(".btns button").forEach(function(btn){btn.addEventListener("touchend",function(e){e.preventDefault();marcar(this);});btn.addEventListener("click",function(){marcar(this);});});\nfunction marcar(btn){var id=parseInt(btn.getAttribute("data-id"));var val=btn.getAttribute("data-val");var card=document.getElementById("c"+id);if(E[id]===val){delete E[id];card.className="card";}else{E[id]=val;card.className="card "+val;}atualizar();}\nfunction aprovarTodos(){DADOS.forEach(function(_,i){E[i]="ok";document.getElementById("c"+i).className="card ok";});atualizar();}\nfunction limparTodos(){DADOS.forEach(function(_,i){delete E[i];document.getElementById("c"+i).className="card";});atualizar();}\nfunction atualizar(){var ok=0,nao=0;Object.values(E).forEach(function(v){if(v==="ok")ok++;else nao++;});var pend=DADOS.length-ok-nao;document.getElementById("stxt").textContent=(ok+nao===0)?"Nenhum item avaliado ainda":ok+" aprovado(s) · "+nao+" reprovado(s) · "+pend+" pendente(s)";}\nfunction abrirWA(e){e.preventDefault();var ok=[],nao=[],pend=[];DADOS.forEach(function(d,i){var parc=d[2]?" ("+d[2]+")":"";var l=d[0]+parc+" — "+d[1];if(E[i]==="ok")ok.push("✅ "+l);else if(E[i]==="nao")nao.push("❌ "+l);else pend.push("⏳ "+l);});var msg="*APROVAÇÃO DE PAGAMENTOS — '+dateLabel+'*\\n"+"━━━━━━━━━━━━━━━━━━━━\\n\\n";if(ok.length)msg+="*✅ APROVADOS ("+ok.length+")*\\n"+ok.join("\\n")+"\\n\\n";if(nao.length)msg+="*❌ REPROVADOS ("+nao.length+")*\\n"+nao.join("\\n")+"\\n\\n";if(pend.length)msg+="*⏳ PENDENTES ("+pend.length+")*\\n"+pend.join("\\n")+"\\n\\n";msg+="━━━━━━━━━━━━━━━━━━━━\\n*Total geral: '+formatBRL(total)+'*";window.location.href="https://wa.me/"+NUM+"?text="+encodeURIComponent(msg);}\natualizar();\n<\/script>\n</body>\n</html>';
}

function escHTML(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
